name: Release

env:
  DEBUG: 'napi:*'
  APP_NAME: prosody
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

on:
  push:

jobs:
#  release-please:
#    name: Release Please
#    runs-on: ubuntu-latest
#    outputs:
#      release_created: ${{ steps.release.outputs.release_created }}
#      tag_name: ${{ steps.release.outputs.tag_name }}
#    steps:
#      - uses: actions/checkout@v4
#      - name: Release Please Action
#        id: release
#        uses: google-github-actions/release-please-action@v3
#        with:
#          release-type: node
#          package-name: prosody
#          token: ${{ secrets.TEMP_GH_ALL_REPOS_RW }}

  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Native builds - commented out for testing
          - target: x86_64-apple-darwin
            host: macos-latest
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
          # Linux Docker builds
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            use_docker: true
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            use_docker: true
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      # Native builds (macOS/Windows)
      - uses: actions/checkout@v4
        if: ${{ !matrix.settings.use_docker }}
      - uses: de-vri-es/setup-git-credentials@v2
        if: ${{ !matrix.settings.use_docker }}
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Setup node
        if: ${{ !matrix.settings.use_docker }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install Rust
        if: ${{ !matrix.settings.use_docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        if: ${{ !matrix.settings.use_docker }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ matrix.settings.target }}-cargo-cache
      - name: Install dependencies
        if: ${{ !matrix.settings.use_docker }}
        run: yarn install
      - name: Build
        if: ${{ !matrix.settings.use_docker }}
        env:
          # Fix for Windows: libgit2's WinHTTP backend can't parse GitHub's extended
          # WWW-Authenticate headers. Using git CLI bypasses this issue.
          # See: https://github.com/libgit2/libgit2/issues/6624
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: yarn build --target ${{ matrix.settings.target }}

      # Docker builds (Linux)
      - uses: actions/checkout@v4
        if: ${{ matrix.settings.use_docker }}
      - name: Configure AWS Credentials
        if: ${{ matrix.settings.use_docker }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::558529356944:role/global-iamr-github-actions-image-build
          role-session-name: GitHubImageBuild
      - name: Login to ECR
        if: ${{ matrix.settings.use_docker }}
        uses: docker/login-action@v3
        with:
          registry: 558529356944.dkr.ecr.us-east-1.amazonaws.com
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Build in Docker
        if: ${{ matrix.settings.use_docker }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.TEMP_GH_ALL_REPOS_RW }}" \
            558529356944.dkr.ecr.us-east-1.amazonaws.com/jemalloc-images:node-22 \
            sh -c "
              # Configure git credentials for private repo access
              git config --global credential.helper store
              git config --global user.name 'GitHub Actions'
              git config --global user.email 'actions@github.com'
              echo 'https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com' > ~/.git-credentials
              chmod 600 ~/.git-credentials

              # Test git access
              echo 'Testing git access...'
              git ls-remote https://github.com/cincpro/prosody.git HEAD || echo 'Git access test failed'

              # Install Rust stable
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
              . ~/.cargo/env &&

              # Install build dependencies
              apt-get update && apt-get install -y cmake libcurl4-openssl-dev

              # Add ARM64 target if needed
              if [ '${{ matrix.settings.target }}' = 'aarch64-unknown-linux-gnu' ]; then
                rustup target add aarch64-unknown-linux-gnu
                apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
                # Set up cross-compilation environment
                export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
                export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi

              # Build with target specification
              yarn install &&
              yarn build --target ${{ matrix.settings.target }}
            "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
            bindings.js
            bindings.d.ts
          if-no-files-found: error

  test-linux-bindings:
    name: test-${{ matrix.target }}-node@${{ matrix.node }}
    needs: [ build ]
    permissions:
      contents: read
      id-token: write  # Required for AWS OIDC
    strategy:
      fail-fast: false
      matrix:
        target: [ x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu ]
        node: [ "20", "22" ]
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            needs_qemu: true
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      # ECR access for Docker image pulls
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::558529356944:role/global-iamr-github-actions-image-build
          role-session-name: GitHubImageBuild

      - name: Login to ECR
        uses: docker/login-action@v3
        with:
          registry: 558529356944.dkr.ecr.us-east-1.amazonaws.com
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: .

      # Set up QEMU for ARM64 testing
      - name: Set up QEMU
        if: ${{ matrix.needs_qemu }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Set up Kafka and Cassandra services
      - name: Create Docker network
        run: docker network create kafka-test-network

      - name: Start Cassandra container
        run: |
          docker run -d --name cassandra --network kafka-test-network \
            -p 9042:9042 \
            cassandra:latest

      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network \
            -e KAFKA_CFG_NODE_ID=0 \
            -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            docker.io/bitnamilegacy/kafka:3.7

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Cassandra and Kafka to be ready..."

          # Wait for Cassandra
          for i in {1..60}; do
            if docker exec cassandra cqlsh -e "SELECT cluster_name FROM system.local;" >/dev/null 2>&1; then
              echo "✅ Cassandra is ready after ${i} attempts"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Cassandra failed to start after 60 seconds"
              docker logs cassandra
              exit 1
            else
              echo "⏳ Cassandra attempt $i: not ready yet..."
              sleep 1
            fi
          done

          # Wait for Kafka
          for i in {1..60}; do
            if docker exec kafka kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "✅ Kafka is ready after ${i} attempts"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Kafka failed to start after 60 seconds"
              docker logs kafka
              exit 1
            else
              echo "⏳ Kafka attempt $i: not ready yet..."
              sleep 1
            fi
          done

          echo "🎉 Both services are ready!"

      # Run tests in Docker
      - name: Test bindings
        run: |
          docker run --rm --network kafka-test-network \
            ${{ matrix.needs_qemu && '--platform linux/arm64' || '' }} \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -e PROSODY_CASSANDRA_NODES=cassandra:9042 \
            -e PROSODY_CASSANDRA_KEYSPACE=prosody_test \
            -v ${{ github.workspace }}:/build -w /build \
            558529356944.dkr.ecr.us-east-1.amazonaws.com/jemalloc-images:node-${{ matrix.node }} \
            sh -c "yarn install && yarn test"

