name: Release

env:
  DEBUG: 'napi:*'
  APP_NAME: prosody
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Force release version (e.g. 2.2.0-beta.1)'
        required: false
        type: string

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Release Please Action
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GH_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ github.event.inputs.release_as }}

  build:
    needs: [ release-please ]
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Native builds
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-pc-windows-msvc
            host: windows-latest
          # Linux Docker builds
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            use_docker: true
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            use_docker: true
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      # Native builds (macOS/Windows)
      - uses: actions/checkout@v4
        if: ${{ !matrix.settings.use_docker }}

      - name: Setup node
        if: ${{ !matrix.settings.use_docker }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install Rust
        if: ${{ !matrix.settings.use_docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        if: ${{ !matrix.settings.use_docker }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ matrix.settings.target }}-cargo-cache
      - name: Install dependencies
        if: ${{ !matrix.settings.use_docker }}
        run: yarn install
      - name: Build
        if: ${{ !matrix.settings.use_docker }}
        run: yarn build --target ${{ matrix.settings.target }}

      # Docker builds (Linux)
      - uses: actions/checkout@v4
        if: ${{ matrix.settings.use_docker }}
      - name: Build in Docker
        if: ${{ matrix.settings.use_docker }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            node:22-bookworm \
            sh -c "
              # Install Rust stable
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
              . ~/.cargo/env &&

              # Install build dependencies
              apt-get update && apt-get install -y cmake libcurl4-openssl-dev

              # Add ARM64 target if needed
              if [ '${{ matrix.settings.target }}' = 'aarch64-unknown-linux-gnu' ]; then
                rustup target add aarch64-unknown-linux-gnu
                apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
                dpkg --add-architecture arm64
                apt-get update
                apt-get install -y zlib1g-dev:arm64 libcurl4-openssl-dev:arm64
                ln -sf /usr/include/aarch64-linux-gnu/curl /usr/aarch64-linux-gnu/include/curl
                export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
                export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi

              # Build with target specification
              yarn install &&
              yarn build --target ${{ matrix.settings.target }}
            "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
            bindings.js
            bindings.d.ts
          if-no-files-found: error

  test-linux-bindings:
    name: test-${{ matrix.target }}-node@${{ matrix.node }}
    needs: [ build ]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [ x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu ]
        node: [ "20", "22" ]
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: .

      # Set up Kafka and Cassandra services
      - name: Create Docker network
        run: docker network create kafka-test-network

      - name: Start Cassandra container
        run: |
          docker run -d --name cassandra --network kafka-test-network \
            -p 9042:9042 \
            cassandra:latest

      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network \
            -e KAFKA_NODE_ID=0 \
            -e KAFKA_PROCESS_ROLES=controller,broker \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            apache/kafka:latest

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Cassandra and Kafka to be ready..."

          # Wait for Cassandra
          for i in {1..60}; do
            if docker exec cassandra cqlsh -e "SELECT cluster_name FROM system.local;" >/dev/null 2>&1; then
              echo "✅ Cassandra is ready after ${i} attempts"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Cassandra failed to start after 60 seconds"
              docker logs cassandra
              exit 1
            else
              echo "⏳ Cassandra attempt $i: not ready yet..."
              sleep 1
            fi
          done

          # Wait for Kafka
          for i in {1..60}; do
            if docker exec kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "✅ Kafka is ready after ${i} attempts"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Kafka failed to start after 60 seconds"
              docker logs kafka
              exit 1
            else
              echo "⏳ Kafka attempt $i: not ready yet..."
              sleep 1
            fi
          done

          echo "🎉 Both services are ready!"

      # Run tests in Docker
      - name: Test bindings
        run: |
          docker run --rm --network kafka-test-network \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -e PROSODY_CASSANDRA_NODES=cassandra:9042 \
            -e PROSODY_CASSANDRA_KEYSPACE=prosody_test \
            -v ${{ github.workspace }}:/build -w /build \
            node:${{ matrix.node }}-bookworm \
            sh -c "yarn install && yarn test"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    needs:
      - release-please
      - build
      - test-linux-bindings
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Download bindings js and types
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .
          pattern: "bindings.*"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts
        run: yarn artifacts
      - name: Publish
        run: npm publish --provenance --access public
