name: Release

env:
  DEBUG: napi:*
  APP_NAME: prosody
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

on:
  push:
#    branches:
#      - main

jobs:
  #  release-please:
  #    name: Release Please
  #    runs-on: ubuntu-latest
  #    outputs:
  #      release_created: ${{ steps.release.outputs.release_created }}
  #      tag_name: ${{ steps.release.outputs.tag_name }}
  #    steps:
  #      - uses: actions/checkout@v4
  #      - name: Release Please Action
  #        id: release
  #        uses: google-github-actions/release-please-action@v3
  #        with:
  #          release-type: node
  #          package-name: prosody
  #          token: ${{ secrets.TEMP_GH_ALL_REPOS_RW }}

  build:
    #    needs: release-please
    #    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: yarn build --target x86_64-apple-darwin
            docker: ""
            qemuPlatform: ""
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: yarn build --target x86_64-pc-windows-msvc
            docker: ""
            qemuPlatform: ""
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: quay.io/pypa/manylinux_2_28_x86_64
            build: yarn build --target x86_64-unknown-linux-gnu
            qemuPlatform: ""
          - host: macos-latest
            target: aarch64-apple-darwin
            build: yarn build --target aarch64-apple-darwin
            docker: ""
            qemuPlatform: ""
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: quay.io/pypa/manylinux_2_28_aarch64
            build: yarn build --target aarch64-unknown-linux-gnu
            qemuPlatform: linux/arm64
          - host: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            docker: ubuntu:20.04
            build: yarn build --target armv7-unknown-linux-gnueabihf
            qemuPlatform: linux/arm/v7
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc
            docker: ""
            qemuPlatform: ""
    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup QEMU
        if: ${{ matrix.settings.docker && matrix.settings.qemuPlatform }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.settings.qemuPlatform }}

      - name: Setup node
        uses: actions/setup-node@v4
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 20
          cache: yarn
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Setup node x86
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        run: yarn config set supportedArchitectures.cpu "ia32"
        shell: bash
      - name: Install dependencies
        run: yarn install
        if: ${{ !matrix.settings.docker }}
      - name: Setup node x86
        uses: actions/setup-node@v4
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 20
          cache: yarn
          architecture: x86
      - name: Build in docker
        if: ${{ matrix.settings.docker }}
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          docker run --rm \
            --platform=${{ matrix.settings.qemuPlatform }} \
            --user 0:0 \
            -v /home/runner/.config/git:/root/.config/git \
            -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db \
            -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache \
            -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index \
            -v ${{ github.workspace }}:/build \
            -w /build \
            -e CARGO_NET_GIT_FETCH_WITH_CLI=true \
            -e DEBIAN_FRONTEND=noninteractive \
            ${{ matrix.settings.docker }} \
            sh -c "
              # Install Node.js 20 and Yarn
              if command -v apt-get >/dev/null 2>&1; then
                # Ubuntu-based ARM builds
                curl -fsSL https://deb.nodesource.com/setup_20.x | bash - &&
                apt-get update &&
                apt-get install -y \
                  build-essential \
                  cmake \
                  curl \
                  git \
                  liblz4-dev \
                  libsasl2-dev \
                  libssl-dev \
                  libzstd-dev \
                  nodejs \
                  npm \
                  pkg-config \
                  wget \
                  zlib1g-dev &&
                wget --no-check-certificate -O /usr/local/share/ca-certificates/mozilla.crt https://curl.se/ca/cacert.pem &&
                chmod 644 /usr/local/share/ca-certificates/mozilla.crt &&
                update-ca-certificates &&
                npm config set cafile /etc/ssl/certs/ca-certificates.crt
              else
                # manylinux builds
                curl -fsSL https://rpm.nodesource.com/setup_20.x | bash - &&
                yum install -y \
                  cmake3 \
                  cyrus-sasl-devel \
                  gcc-c++ \
                  libzstd-devel \
                  lz4-devel \
                  nodejs \
                  openssl-devel \
                  zlib-devel
              fi &&
          
              # Setup yarn
              npm install -g yarn &&
          
              # Setup git credentials
              git config --global credential.helper 'store --file=/root/.config/git/credentials' &&
          
              # Install Rust
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
              export PATH=\"/root/.cargo/bin:$PATH\" &&
              rustup install stable &&
              rustup target add ${{ matrix.settings.target }} &&

              # Install dependencies and build
              yarn install &&
              ${{ matrix.settings.build }}
            "
      - name: Build
        run: ${{ matrix.settings.build }}
        if: ${{ !matrix.settings.docker }}
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
            bindings.js
            bindings.d.ts
          if-no-files-found: error

  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            architecture: arm64
        node:
          - "18"
          - "20"
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
          architecture: ${{ matrix.settings.architecture }}
      - name: Install dependencies
        run: yarn install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: Test bindings
        run: yarn test

  test-linux-x64-gnu-binding:
    name: Test bindings on Linux-x64-gnu - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - "18"
          - "20"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .
      - name: Create Docker network
        run: docker network create kafka-test-network
      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network \
            -e KAFKA_CFG_NODE_ID=0 \
            -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            docker.io/bitnami/kafka:3.7
      - name: Test bindings
        run: |
          docker run --rm --network kafka-test-network \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -v $(pwd):/build -w /build \
            node:${{ matrix.node }}-slim \
            yarn test

  test-linux-aarch64-gnu-binding:
    name: Test bindings on aarch64-unknown-linux-gnu - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - "18"
          - "20"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-unknown-linux-gnu
          path: .
      - name: Install dependencies
        run: |
          yarn config set supportedArchitectures.cpu "arm64"
          yarn config set supportedArchitectures.libc "glibc"
          yarn install
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Create Docker network
        run: docker network create kafka-test-network
      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network --platform linux/arm64 \
            -e KAFKA_CFG_NODE_ID=0 \
            -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            docker.io/bitnami/kafka:3.7
      - name: Test bindings
        run: |
          docker run --rm --network kafka-test-network --platform linux/arm64 \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -v $(pwd):/build -w /build \
            node:${{ matrix.node }}-slim \
            yarn test

  test-linux-arm-gnueabihf-binding:
    name: Test bindings on armv7-unknown-linux-gnueabihf - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - "18"
          - "20"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-armv7-unknown-linux-gnueabihf
          path: .
      - name: Install dependencies
        run: |
          yarn config set supportedArchitectures.cpu "arm"
          yarn install
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Create Docker network
        run: docker network create kafka-test-network
      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network --platform linux/arm/v7 \
            -e KAFKA_CFG_NODE_ID=0 \
            -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            docker.io/bitnami/kafka:3.7
      - name: Test bindings
        run: |
          docker run --rm --network kafka-test-network --platform linux/arm/v7 \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -v $(pwd):/build -w /build \
            node:${{ matrix.node }}-bullseye-slim \
            yarn test

  universal-macOS:
    name: Build universal macOS binary
    needs:
      - build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-apple-darwin
          path: artifacts
          pattern: "*.node"
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-apple-darwin
          path: artifacts
          pattern: "*.node"
      - name: Download bindings js and types
        uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-apple-darwin
          path: .
          pattern: "bindings.*"
      - name: Combine binaries
        run: yarn universal
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-universal-apple-darwin
          path: |
            ${{ env.APP_NAME }}.*.node
            bindings.js
            bindings.d.ts
          if-no-files-found: error
