name: CI

env:
  DEBUG: 'napi:*'
  APP_NAME: prosody
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

on:
  push:
#    branches:
#      - main

jobs:
  #  release-please:
  #    name: Release Please
  #    runs-on: ubuntu-latest
  #    outputs:
  #      release_created: ${{ steps.release.outputs.release_created }}
  #      tag_name: ${{ steps.release.outputs.tag_name }}
  #    steps:
  #      - uses: actions/checkout@v4
  #      - name: Release Please Action
  #        id: release
  #        uses: google-github-actions/release-please-action@v3
  #        with:
  #          release-type: node
  #          package-name: prosody
  #          token: ${{ secrets.TEMP_GH_ALL_REPOS_RW }}

  build:
    #    needs: release-please
    #    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-apple-darwin
            flags: '-x'
          - target: aarch64-apple-darwin
            flags: '-x'
          - target: x86_64-pc-windows-msvc
            flags: '-x'
          - target: aarch64-pc-windows-msvc
            flags: '-x'
          - target: x86_64-unknown-linux-gnu
            flags: '--use-napi-cross'
          - target: aarch64-unknown-linux-gnu
            flags: '--use-napi-cross'
          - target: x86_64-unknown-linux-musl
            flags: '-x'
          - target: aarch64-unknown-linux-musl
            flags: '-x'
          - target: armv7-unknown-linux-gnueabihf
            flags: '--use-napi-cross'
          - target: armv7-unknown-linux-musleabihf
            flags: '-x'
    name: stable - ${{ matrix.settings.target }} - node@22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Install cargo-xwin
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-xwin
      - name: Install cargo-zigbuild
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-zigbuild
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ${{ github.workspace }}/.xwin
            ~/.napi-rs
            ./target
          key: ${{ matrix.settings.target }}-cargo-cache
      - name: Install dependencies
        run: yarn install
      - name: Build
        run: yarn build --target ${{ matrix.settings.target }} ${{ matrix.settings.flags }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
            bindings.js
            bindings.d.ts
          if-no-files-found: error

  test-linux-x64-gnu-binding:
    name: Test bindings on Linux-x64-gnu - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .
      - name: Create Docker network
        run: docker network create kafka-test-network
      - name: Start Cassandra container
        run: |
          docker run -d --name cassandra --network kafka-test-network \
            -p 9042:9042 \
            cassandra:latest
      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network \
            -e KAFKA_CFG_NODE_ID=0 \
            -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            docker.io/bitnami/kafka:3.7
      - name: Wait for services to be ready
        run: |
          echo "Waiting for Cassandra and Kafka to be ready..."

          # Wait for Cassandra
          echo "🔍 Checking Cassandra..."
          for i in {1..60}; do
            if docker exec cassandra cqlsh -e "SELECT cluster_name FROM system.local;" >/dev/null 2>&1; then
              echo "✅ Cassandra is ready after ${i} attempts (${i} seconds)"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Cassandra failed to start after 60 seconds"
              docker logs cassandra
              exit 1
            else
              echo "⏳ Cassandra attempt $i: not ready yet..."
              sleep 1
            fi
          done

          # Wait for Kafka
          echo "🔍 Checking Kafka..."
          for i in {1..60}; do
            if docker exec kafka kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "✅ Kafka is ready after ${i} attempts (${i} seconds)"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Kafka failed to start after 60 seconds"
              docker logs kafka
              exit 1
            else
              echo "⏳ Kafka attempt $i: not ready yet..."
              sleep 1
            fi
          done

          echo "🎉 Both services are ready!"
      - name: Test bindings
        run: |
          docker run --rm --network kafka-test-network \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -e PROSODY_CASSANDRA_NODES=cassandra:9042 \
            -e PROSODY_CASSANDRA_KEYSPACE=prosody_test \
            -v $(pwd):/build -w /build \
            node:${{ matrix.node }}-slim \
            yarn test

