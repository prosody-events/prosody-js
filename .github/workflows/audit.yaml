name: Audit
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Rerun periodically to pick up new advisories
  schedule:
    - cron: '0 0 * * *'
  # Run manually
  workflow_dispatch:

jobs:
  audit:
    name: CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://rg-geekbot:${{ secrets.GH_ALL_REPOS_RW }}@github.com/
      - uses: actions-rust-lang/audit@v1
        name: Audit Rust Dependencies
